name: bump-version

on:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}  
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cocogitto/cocogitto-action@v4
        with:
          command: bump
          args: --auto
          git-user: Keinsleif (GitHub Actions)
          git-user-email: mountaindull@gmail.com

      - name: Push tags
        run: git push --follow-tags
